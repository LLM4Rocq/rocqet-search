# Railway deployment configuration for Roqet API
# Deploy at: railway.app

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.api"

[deploy]
# The image's CMD already binds uvicorn to $PORT; no startCommand needed.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

# Dockerfile.api bakes everything the API needs:
#   - ROQET_EMBEDDER=local + the embedding model (cached in the image)
#   - the Qdrant index, built at image build time (on-disk, /app/data)
# So no variables are required to run. Optional overrides (Variables tab):
#   CORS_ORIGINS    comma-separated allowed origins (set to your Vercel URL to lock down CORS)
#   EMBED_MODEL     swap the sentence-transformers model (must match how the index was built)
